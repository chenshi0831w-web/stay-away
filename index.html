<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>追跡封鎖 -Tactical Trap- Demo</title>
    <style>
        body { background: #1a1a1a; color: #e0e0e0; font-family: 'Hiragino Kaku Gothic Pro', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; }
        #ui { margin: 20px; text-align: center; border-bottom: 2px solid #c23616; padding-bottom: 10px; width: 80%; }
        .grid { display: grid; grid-template-columns: repeat(10, 40px); grid-template-rows: repeat(10, 40px); gap: 3px; background: #333; padding: 10px; border: 2px solid #555; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .cell { width: 40px; height: 40px; background: #2c3e50; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; transition: 0.2s; }
        .cell:hover { background: #34495e; }
        .cell.wall { background: #c23616; box-shadow: inset 0 0 10px #000; position: relative; } /* 証拠品（路障） */
        .cell.wall::after { content: '証'; font-size: 10px; color: #fff; }
        .cell.player { background: #f1c40f; border-radius: 50%; scale: 0.8; box-shadow: 0 0 15px #f1c40f; border: 2px solid #fff; } /* 犯人（对手） */
        .cell.goal { background: #27ae60; font-weight: bold; border: 2px dashed #fff; } /* 出口 */
        button { padding: 12px 30px; font-size: 18px; background: #c23616; border: none; color: white; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #e84118; transform: scale(1.05); }
        button:disabled { background: #7f8c8d; cursor: not-allowed; transform: none; }
        .status-val { color: #f1c40f; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>追跡封鎖 -Tactical Trap-</h1>
        <p id="msg">犯人の心理を突く <span id="count" class="status-val">12</span> 個の「証拠品」を配置せよ</p>
        <div id="hpDisplay" style="display:none">犯人の逃走意欲: <span id="hp" class="status-val">100</span> %</div>
    </div>

    <div class="grid" id="map"></div>

    <button id="startBtn" onclick="startRun()" disabled>包囲網展開（Start）</button>

<script>
    const ROWS = 10;
    const COLS = 10;
    const MAX_WALLS = 12;
    let walls = [];
    let playerPos = { r: 0, c: 0 };
    let hp = 100;
    let isRunning = false;

    // 1. マップの初期化
    const mapEl = document.getElementById('map');
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.r = r;
            cell.dataset.c = c;
            
            if (r === 0 && c === 0) cell.classList.add('player');
            if (r === ROWS-1 && c === COLS-1) {
                cell.classList.add('goal');
                cell.innerText = "出口";
            }

            cell.onclick = () => toggleWall(r, c, cell);
            mapEl.appendChild(cell);
        }
    }

    // 2. 証拠品（バリケード）の配置ロジック
    function toggleWall(r, c, el) {
        if (isRunning) return;
        if ((r === 0 && c === 0) || (r === ROWS-1 && c === COLS-1)) return;

        const idx = walls.findIndex(w => w.r === r && w.c === c);
        if (idx > -1) {
            walls.splice(idx, 1);
            el.classList.remove('wall');
        } else if (walls.length < MAX_WALLS) {
            walls.push({r, c});
            el.classList.add('wall');
        }

        document.getElementById('count').innerText = MAX_WALLS - walls.length;
        document.getElementById('startBtn').disabled = walls.length < MAX_WALLS;
    }

    // 3. 実行フェーズ（犯人の移動ロジック）
    async function startRun() {
        isRunning = true;
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('hpDisplay').style.display = 'block';
        document.getElementById('msg').innerText = "犯人が逃走を開始した...";

        while (playerPos.r < ROWS - 1 || playerPos.c < COLS - 1) {
            // AI挙動：出口を目指すが、ランダム性を持たせて「動揺」を演出
            if (playerPos.c < COLS - 1 && Math.random() > 0.4) {
                playerPos.c++;
            } else if (playerPos.r < ROWS - 1) {
                playerPos.r++;
            } else {
                playerPos.c++;
            }

            updatePlayerVisual();

            // 証拠品への接触判定（心理的ダメージ）
            if (walls.some(w => w.r === playerPos.r && w.c === playerPos.c)) {
                hp -= 34; // 3回の接触でほぼゼロになる設定
                document.getElementById('hp').innerText = hp < 0 ? 0 : hp;
                
                // CC2風の衝撃演出（簡易版）
                document.body.style.backgroundColor = "#c23616";
                setTimeout(() => document.body.style.backgroundColor = "#1a1a1a", 100);

                if (hp <= 0) {
                    alert("【包囲完了】犯人の逃走意欲を粉砕しました。あなたの勝利です！");
                    location.reload();
                    return;
                }
            }

            await new Promise(resolve => setTimeout(resolve, 250)); 
        }

        alert("【任務失敗】犯人は出口へ到達しました。");
        location.reload();
    }

    function updatePlayerVisual() {
        document.querySelectorAll('.cell').forEach(el => el.classList.remove('player'));
        const current = document.querySelector(`[data-r="${playerPos.r}"][data-c="${playerPos.c}"]`);
        if(current) current.classList.add('player');
    }
</script>
</body>
</html>
